version: "0.2"

# =====================================================================================
# COMPACTION STRESS TEST CONFIG
# =====================================================================================
# Purpose: Forces compaction to trigger early and often by using a tiny 3k token window.
# Used for validating compaction logic, segment summarization, and post-compaction retrieval.
#
# Usage:
#   virtual-context -c virtual-context-compact-test.yaml chat --headless --replay prompts100.txt
#
# Key differences from the main config:
#   - 3k context window (vs 120k) — compaction fires every ~5 turns
#   - Separate storage at .virtualcontext-compact-test/ — won't pollute main data
#   - Both tagger and summarizer use Anthropic Haiku — fast, accurate, no local GPU needed
#   - Heuristic broad/temporal detection disabled — Haiku handles these natively
#   - Lower assembly budgets to fit the tiny window

storage_root: ".virtualcontext-compact-test"
context_window: 3000
token_counter: "estimate"

paging:
  enabled: true
  autonomous_models:
    - opus
    - sonnet
    - gpt-4
    - gpt-4o

# =====================================================================================
# TAG GENERATOR — Haiku tagger with detailed prompt
# =====================================================================================
# Uses Anthropic Haiku for high-quality tagging. Haiku reliably detects broad and temporal
# queries via its detailed prompt, so regex heuristic overrides are disabled (empty lists).

tag_generator:
  type: "llm"
  provider: "anthropic"
  model: "claude-haiku-4-5-20251001"
  max_tags: 10
  min_tags: 5
  prompt_mode: "detailed"

  # Heuristics disabled — Haiku detects broad/temporal natively via the detailed prompt.
  broad_heuristic_enabled: false
  temporal_heuristic_enabled: false

  # keyword_fallback: Used when the LLM is unavailable. Maps keywords and regex patterns
  # to tags for deterministic fallback tagging.
  keyword_fallback:
    tag_keywords:
      legal:
        - court
        - filing
        - motion
        - attorney
        - legal
        - case
        - judge
      medical:
        - insulin
        - medication
        - doctor
        - lab
        - blood
        - glucose
      code:
        - function
        - bug
        - deploy
        - git
        - API
        - database
        - error
    tag_patterns:
      legal:
        - "\\bN\\.?J\\.?S\\.?A\\.?\\b"
        - "\\b\\d{2}-cv-\\d+"
      code:
        - "\\bdef \\w+\\("
        - "\\bclass \\w+[:(]"

# =====================================================================================
# TAG RULES — per-tag priority and TTL
# =====================================================================================
# Controls assembly order (higher priority = included first) and auto-expiration.
# match: fnmatch pattern against tag names
# priority: 1-10 scale, higher = assembled first when budget is tight
# ttl_days: auto-delete stored segments after N days (null = never expire)

tag_rules:
  - match: "architecture*"
    priority: 10
    ttl_days: null
  - match: "database*"
    priority: 8
    ttl_days: null
  - match: "debug*"
    priority: 7
    ttl_days: 7
  - match: "legal*"
    priority: 9
    ttl_days: null
  - match: "medical*"
    priority: 8
    ttl_days: 90
  - match: "*"            # catch-all for unmatched tags
    priority: 5
    ttl_days: 30

# =====================================================================================
# COMPACTION — tuned for 3k window stress testing
# =====================================================================================
# With a 3k window:
#   soft_threshold 0.70 = compaction starts at ~2,100 tokens
#   hard_threshold 0.85 = mandatory compaction at ~2,550 tokens
# protected_recent_turns is 4 (not 6) to leave room for summaries in the tiny window.

compaction:
  soft_threshold: 0.70
  hard_threshold: 0.85
  protected_recent_turns: 4    # lower than default 6 to fit in 3k window
  overflow_buffer: 1.2
  summary_ratio: 0.15
  min_summary_tokens: 100      # lower than default 200 — short summaries for tiny window
  max_summary_tokens: 800      # lower than default 2000
  max_concurrent_summaries: 4

# =====================================================================================
# SUMMARIZATION — Haiku for compaction summaries
# =====================================================================================
# Uses Haiku for both tagging and summarization in this config. Summarization runs in a
# background thread, so latency is less critical than quality.

summarization:
  provider: "anthropic"
  model: "claude-haiku-4-5-20251001"
  max_tokens: 500
  temperature: 0.3

# =====================================================================================
# PROVIDERS
# =====================================================================================

providers:
  ollama:
    type: "generic_openai"
    base_url: "http://127.0.0.1:11434/v1"
  anthropic:
    type: "anthropic"
    api_key_env: "ANTHROPIC_API_KEY"   # reads API key from this environment variable
    model: "claude-haiku-4-5-20251001"

# =====================================================================================
# STORAGE — isolated from main runs
# =====================================================================================
# Separate DB so stress test data doesn't pollute the main storage.

storage:
  backend: "sqlite"
  sqlite:
    path: ".virtualcontext-compact-test/store.db"
  filesystem:
    root: ".virtualcontext-compact-test/store"

# =====================================================================================
# ASSEMBLY — small budgets for 3k window
# =====================================================================================
# With only 3k tokens total, assembly budgets must be small.
# core_context: 500 tokens for always-included files
# tag_context: 1000 tokens for retrieved tag summaries

assembly:
  core_context_max_tokens: 500
  tag_context_max_tokens: 1000
  context_hint_enabled: true
  context_hint_max_tokens: 200
  core_files: []

# =====================================================================================
# RETRIEVAL
# =====================================================================================

retrieval:
  skip_active_tags: true
  active_tag_lookback: 4
  strategy_config:
    default:
      min_overlap: 1
      max_results: 5           # fewer results than default 10 — fits the tiny window
      max_budget_fraction: 0.25
      include_related: true    # bridges vocabulary mismatches via related_tags

# =====================================================================================
# COST TRACKING
# =====================================================================================

cost_tracking:
  enabled: true
  pricing:
    ollama:
      input_per_1k: 0.0       # local models = free
      output_per_1k: 0.0
    anthropic:
      input_per_1k: 0.00025   # Haiku pricing
      output_per_1k: 0.00125
